<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкетирование пользователей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="survey-container">
        <h1 class="survey-title">Анкетирование пользователей</h1>

        <form id="survey-form">
            <!-- Контейнер для динамических вопросов -->
            <div id="questions-wrapper">
                <p class="status-text">Загрузка вопросов...</p>
            </div>

            <!-- Кнопка отправки -->
            <button type="submit" id="submit-btn" class="submit-button hidden">
                Скачать результаты (.txt)
            </button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
